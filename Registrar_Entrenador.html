<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZXGym - Crear Entrenador</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/tablas.css">
    <link rel="stylesheet" href="css/formularios.css">
</head>
<body>
    <div class="tarjeta tarjeta-pantalla-completa" id="DivTarjeta_CrearEntrenador">
        <h1 id="tituloFormularioEntrenador">Alta de Nuevo Staff</h1>
        <form id="formEntrenador" novalidate>
            
            <div class="AltaEntrenador_1" id="Div_AltaEntrenador1">
                <h2>Información General</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label for="dni">Número de DNI</label>
                        <input type="number" id="dni" placeholder="Ej: 12345678" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="Ej: Juan" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" placeholder="Ej: Pérez" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="juan@ejemplo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="Ej: 1123456789" required>
                    </div>
                </div>
            </div>

            <div class="AltaEntrenador_2" id="Div_AltaEntrenador2" style="display: none;"> 
                <h3>Información Profesional</h3>
                
                <label class="label-formulario" for="especialidad">Especialidad</label>
                <select id="especialidad" class="select-entrenador" required>
                    <option value="" disabled selected>Seleccione una especialidad...</option>
                    <option value="Musculación">Musculación</option>
                    <option value="Crossfit">Crossfit</option>
                    <option value="Pilates">Pilates</option>
                    <option value="Spinning">Spinning</option>
                    <option value="Personal Trainer">Personal Trainer</option>
                </select>

                <label class="label-formulario" for="turno">Turno Asignado</label>
                <select id="turno" class="select-entrenador" required>
                    <option value="" disabled selected>Seleccione un turno...</option>
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>

                <label class="label-formulario" for="fechaIngreso">Fecha de Ingreso</label>
                <input type="date" id="fechaIngreso" class="input-fecha" required>

                <label class="label-formulario" for="fechaRCP">Vencimiento Curso RCP</label>
                <input type="date" id="fechaRCP" class="input-fecha" required>
            </div>
            
            <div class="AltaEntrenador_1" id="Btns_Paso1">
                <button type="button" class="btn-eliminar" id="btnClose" onclick="window.close()">Cancelar</button>
                <button type="button" class="btn-guardar" onclick="EstadoFormularioEntrenadores(2)">Siguiente</button>
            </div>

            <div class="AltaEntrenador_2" id="Btns_Paso2" style="display: none;">
                <button type="button" class="btn-eliminar" onclick="EstadoFormularioEntrenadores(1)">Volver</button>
                <button type="submit" class="btn-guardar" id="btnSubmitEntrenador">Guardar Entrenador</button>
            </div>

        </form>
    </div>
            
    <script type="module" src="js/main.js"></script>
</body>
</html>
